name: E2E Tests

on:
  push:
    tags: ["v*"]

jobs:
  test:
    name: E2E (pytest + real Postgres)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: mcpgate
          POSTGRES_PASSWORD: mcpgate
          POSTGRES_DB: mcpgate_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-test.txt

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-test.txt

      - name: Run E2E tests
        run: pytest tests/ -v
        env:
          DATABASE_URL: postgresql+asyncpg://mcpgate:mcpgate@localhost:5432/mcpgate_test
          ADMIN_API_KEY: test-admin-key
          MCPGATE_TEST: "1"
