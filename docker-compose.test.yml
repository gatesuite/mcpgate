services:
  test:
    build:
      context: .
      target: test
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://mcpgate:mcpgate@postgres:5432/mcpgate_test
      ADMIN_API_KEY: test-admin-key
      MCPGATE_TEST: "1"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mcpgate
      POSTGRES_PASSWORD: mcpgate
      POSTGRES_DB: mcpgate_test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mcpgate"]
      interval: 5s
      timeout: 3s
      retries: 5
