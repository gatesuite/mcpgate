version: '3.8'

services:
  mcpgate:
    build: .
    ports:
      - "8001:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://mcpgate:mcpgate@postgres:5432/mcpgate
      - ADMIN_API_KEY=super-secret-admin-key-change-me
      - KEY_PREFIX=mcp_sk_
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=mcpgate
      - POSTGRES_PASSWORD=mcpgate
      - POSTGRES_DB=mcpgate
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mcpgate"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
